# CodeGraph Ferrari Configuration — per-repo codegraph
# Project: moedularizer
paths:
  codegraph_dir: .codegraph
  bin_dir: bin

vector:
  dimension: 1024

embedding:
  url: "https://medjat.libermoe.com/embed"
  token: ""
  model: "qwen3-embedding-0.6b-q8_0"
  dim: 1024

llm:
  mistral:
    url: "${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}"
    model: "nvidia/llama-3.1-nemotron-70b-instruct"
    api_key: "${NVIDIA_API_KEYS:-}"
  openrouter:
    url: ""
    model: ""
    api_key: ""

pipeline:
  default_timeout: 300
  summaries_timeout: 3600
  batch_size: 25
  max_versions: 3
  summaries_workers: 6
  summaries_batch_size: 100

community:
  resolution: 1.5
  edge_weights:
    Calls: 1.0
    CalledBy: 1.0
    Implements: 0.9
    ImplementedBy: 0.9
    Extends: 0.8
    ExtendedBy: 0.8
    Uses: 0.7
    UsedBy: 0.7
    Contains: 0.6
    ContainedBy: 0.6
    Imports: 0.5
    ImportedBy: 0.5
    LazyImport: 0.4
    LazyImportedBy: 0.4
    References: 0.3
    ReferencedBy: 0.3
    DataFlow: 0.4
    ControlFlow: 0.4
