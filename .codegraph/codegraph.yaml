# CodeGraph Ferrari Configuration — per-repo codegraph
# Project: moedularizer
paths:
  codegraph_dir: .codegraph
  bin_dir: bin

vector:
  dimension: 1024

embedding:
  url: "http://localhost:28080"
  token: ""
  model: "qwen3-embedding-0.6b-q8_0.gguf"
  dim: 1024
  boosters:
    - type: llamacpp
      url: "http://tunnel.prankh.libermoe.com:26420"
      model: "qwen3-embed"
      max_concurrency: 350

providers:
  - name: deepseek
    url: "https://api.deepseek.com/v1/chat/completions"
    models: ["deepseek-v4-flash"]
    keys_env: "DEEPSEEK_V4_API_KEY"
    workers: 1000
    extra_body:
      thinking:
        type: disabled
  - name: mistral
    url: "https://api.mistral.ai/v1/chat/completions"
    models: ["mistral-large-latest"]
    keys_env: "MISTRAL_API_KEYS"
    workers: 2

llm:
  mistral:
    url: "${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}"
    model: "nvidia/llama-3.1-nemotron-70b-instruct"
    api_key: "${NVIDIA_API_KEYS:-}"
  openrouter:
    url: ""
    model: ""
    api_key: ""

pipeline:
  default_timeout: 300
  summaries_timeout: 3600
  batch_size: 25
  max_versions: 3
  summaries_workers: 6
  summaries_batch_size: 100

community:
  resolution: 1.5
  edge_weights:
    Calls: 1.0
    CalledBy: 1.0
    Implements: 0.9
    ImplementedBy: 0.9
    Extends: 0.8
    ExtendedBy: 0.8
    Uses: 0.7
    UsedBy: 0.7
    Contains: 0.6
    ContainedBy: 0.6
    Imports: 0.5
    ImportedBy: 0.5
    LazyImport: 0.4
    LazyImportedBy: 0.4
    References: 0.3
    ReferencedBy: 0.3
    DataFlow: 0.4
    ControlFlow: 0.4
